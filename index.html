<!DOCTYPE html>
<html>
<head>
    <title>Hand Magic Effect</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; width: 100%; height: 100%; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const video = document.getElementById('input_video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        
        // Setup MediaPipe Hands
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });
        
        let particles = [];

        function drawFiberThread(p1, p2) {
            const grad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
            grad.addColorStop(0, '#00ffff'); grad.addColorStop(1, '#ff00ff');
            ctx.strokeStyle = grad;
            ctx.lineWidth = 2;
            for(let i=-2; i<=2; i++) {
                ctx.beginPath();
                ctx.moveTo(p1.x + i, p1.y + i);
                ctx.lineTo(p2.x + i, p2.y + i);
                ctx.stroke();
            }
        }

        hands.onResults((results) => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.multiHandLandmarks) {
                let hand1 = results.multiHandLandmarks[0];
                let hand2 = results.multiHandLandmarks[1];

                // Draw Fiber Skeleton
                results.multiHandLandmarks.forEach(landmarks => {
                    // Simplified connection logic
                    [0,1,2,3,4, 0,5,6,7,8, 0,17,18,19,20].forEach((idx, i, arr) => {
                        if(i % 5 !== 4) drawFiberThread(landmarks[arr[i]], landmarks[arr[i+1]]);
                    });
                    // Finger tips
                    [4, 8, 12, 16, 20].forEach(idx => {
                        ctx.fillStyle = 'white';
                        ctx.shadowBlur = 10;
                        ctx.beginPath(); ctx.arc(landmarks[idx].x * canvas.width, landmarks[idx].y * canvas.height, 5, 0, Math.PI*2);
                        ctx.fill();
                    });
                });

                // Energy Ball Logic
                if (hand1 && hand2) {
                    const dist = Math.hypot(hand1[4].x - hand1[8].x, hand1[4].y - hand1[8].y);
                    const radius = dist * 500 * 2; // Scaling factor
                    const midX = (hand2[9].x) * canvas.width;
                    const midY = (hand2[9].y) * canvas.height;

                    const g = ctx.createRadialGradient(midX, midY, 0, midX, midY, radius);
                    g.addColorStop(0, 'white'); g.addColorStop(0.2, 'blue'); g.addColorStop(1, 'transparent');
                    ctx.fillStyle = g;
                    ctx.beginPath(); ctx.arc(midX, midY, radius, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        });

        const camera = new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 1280, height: 720 });
        camera.start();
    </script>
</body>
</html>
